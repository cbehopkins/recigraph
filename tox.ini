[tox]
requires =
    tox>=4
    tox-uv>=1
env_list =
    ruff
    format
    pyright
    pytest
    build

[testenv]
package = editable

[testenv:ruff]
description = Run Ruff lint checks (matches CI)
skip_install = true
deps =
    ruff>=0.9
commands =
    ruff check .

[testenv:format]
description = Run Ruff format checks (matches CI)
skip_install = true
deps =
    ruff>=0.9
commands =
    ruff format --check .

[testenv:pyright]
description = Run Pyright type checks (matches CI)
skip_install = true
deps =
    pyright>=1.1
    pydantic>=2.0
    pyyaml>=6.0
commands =
    pyright

[testenv:pytest]
description = Run pytest suite (matches CI)
deps =
    pytest>=8.0
    pytest-cov
commands =
    pytest

[testenv:build]
description = Build package and verify artifacts (matches CI)
skip_install = true
deps =
    build
    twine>=6
commands =
    python -m build
    twine check dist/*
