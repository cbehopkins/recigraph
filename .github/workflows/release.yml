name: Release

# Triggered when Release Please merges a Release PR and creates the Git tag.
# The tag format must be v<SemVer> (e.g. v0.1.0).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"  # pre-release tags such as v1.0.0-beta.1

# Only one release can run at a time (safety net).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest
    outputs:
      # Pass the resolved version to subsequent jobs for the GitHub Release title.
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools-scm reads the full tag history to compute the version.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project and dev dependencies
        run: uv sync --all-extras

      # Capture the version that setuptools-scm derives from the Git tag so
      # we can reference it in the GitHub Release title.
      - name: Resolve package version
        id: version
        run: |
          VER=$(uv run python -c "from importlib.metadata import version; print(version('recigraph'))")
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Build wheel and sdist.
      # uv build produces dist/recigraph-<version>-py3-none-any.whl and
      # dist/recigraph-<version>.tar.gz
      # -----------------------------------------------------------------------
      - name: Build wheel and sdist
        run: uv build

      # Twine check validates the long description and other metadata without
      # requiring a PyPI account.
      - name: Verify packages
        run: uv run python -m twine check dist/*

      # Upload artefacts so the publish and github-release jobs can access them.
      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish to PyPI via Trusted Publishing (OIDC).
  #
  # To activate publishing:
  #   1. Configure a Trusted Publisher on pypi.org for this repository.
  #   2. Add a PyPI environment named "pypi" in GitHub repository settings.
  #   3. Remove the `if: false` guard below.
  #
  # See: https://docs.pypi.org/trusted-publishers/
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC Trusted Publishing

    # TODO: remove `if: false` once Trusted Publishing is configured on PyPI.
    if: false

    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ---------------------------------------------------------------------------
  # Create a GitHub Release and attach build artefacts.
  # This runs regardless of whether PyPI publishing is enabled.
  # ---------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create releases and upload assets

    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # The Release Please workflow already creates a draft GitHub Release
      # from the release notes.  This step promotes it to a published release
      # and attaches the build artefacts.
      - name: Create GitHub Release and upload artefacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "recigraph ${{ needs.build.outputs.version }}"
          # Release Please populates the body when it creates the Release PR.
          # The body is already present on the tag; do not override it here.
          generate_release_notes: false
          files: |
            dist/*.whl
            dist/*.tar.gz
